<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mercari Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: #f7f5f3; color: #1a1714; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0ccc8; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #b0aca8; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
{% raw %}
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ── Tweakable defaults (originally a Claude Design tweaks panel) ───────────
const ACCENT  = "#e84040";
const LAYOUT  = "list";          // "list" | "grid"
const DENSITY = "comfortable";   // "comfortable" | "compact"
const SHOW_IMG = true;
const SPLIT_RATIO = 55;          // % width of results panel

// ── Color utilities ────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function accentAlpha(hex, a) {
  const {r,g,b} = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

function formatPrice(value) {
  if (value === null || value === undefined || value === "" || value === 0 || value === "0") return "¥?";
  const n = typeof value === "number" ? value : parseInt(String(value).replace(/,/g, "").trim(), 10);
  if (Number.isNaN(n)) return `¥${value}`;
  return `¥${n.toLocaleString()}`;
}

// ── Thumbnail (Mercari image when available, fallback to icon) ─────────────
function PlaceholderImg({ size = 56, src }) {
  const [failed, setFailed] = useState(false);
  const base = {
    width:size, height:size, minWidth:size,
    background:"#ede9e5", borderRadius:8,
    display:"flex", alignItems:"center", justifyContent:"center",
    fontSize:size*0.45, userSelect:"none",
    overflow:"hidden",
  };
  if (src && !failed) {
    return (
      <div style={base}>
        <img
          src={src}
          alt=""
          loading="lazy"
          referrerPolicy="no-referrer"
          onError={() => setFailed(true)}
          style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }}
        />
      </div>
    );
  }
  return <div style={base}>🛍</div>;
}

// ── Result Row (list layout) ───────────────────────────────────────────────
function ResultRow({ item, selected, focused, onSelect, onDoubleClick, density, accent, showImg }) {
  const pad = density === "compact" ? "8px 12px" : "12px 16px";
  const bg = focused ? accentAlpha(accent, 0.12) : selected ? accentAlpha(accent, 0.07) : "transparent";
  const border = focused ? `1.5px solid ${accentAlpha(accent, 0.5)}` : "1.5px solid transparent";
  return (
    <div
      onClick={onSelect}
      onDoubleClick={onDoubleClick}
      style={{ padding:pad, display:"flex", gap:12, alignItems:"center", background:bg, border, borderRadius:8, margin:"2px 4px", cursor:"pointer", transition:"background 0.12s" }}
    >
      {showImg && <PlaceholderImg size={density==="compact"?40:52} src={item.thumbnail} />}
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:14, fontWeight:500, color:"#1a1714", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
          {item.title || "(no title)"}
        </div>
        <div style={{ fontSize:12, color:"#888", marginTop:2, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
          ID {item.id}
        </div>
      </div>
      <div style={{ fontSize:16, fontWeight:600, color:accent, whiteSpace:"nowrap" }}>
        {formatPrice(item.price)}
      </div>
    </div>
  );
}

// ── Result Card (grid layout) ──────────────────────────────────────────────
function ResultCard({ item, selected, focused, onSelect, onDoubleClick, accent }) {
  const bg = focused ? accentAlpha(accent, 0.1) : selected ? accentAlpha(accent, 0.06) : "#fff";
  const shadow = focused ? `0 0 0 2px ${accentAlpha(accent,0.5)}` : selected ? `0 0 0 1.5px ${accentAlpha(accent,0.3)}` : "0 1px 4px rgba(0,0,0,0.08)";
  return (
    <div onClick={onSelect} onDoubleClick={onDoubleClick}
      style={{ background:bg, borderRadius:10, boxShadow:shadow, padding:"12px", cursor:"pointer", transition:"box-shadow 0.12s, background 0.12s", display:"flex", flexDirection:"column", gap:8 }}>
      <PlaceholderImg size={80} src={item.thumbnail} />
      <div style={{ fontSize:13, fontWeight:500, color:"#1a1714", lineHeight:1.35, WebkitLineClamp:2, overflow:"hidden", display:"-webkit-box", WebkitBoxOrient:"vertical" }}>{item.title}</div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontSize:15, fontWeight:600, color:accent }}>{formatPrice(item.price)}</span>
      </div>
    </div>
  );
}

// ── Details Panel ──────────────────────────────────────────────────────────
function DetailsPanel({ items, loading, accent }) {
  if (loading) return (
    <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:10, color:accent }}>
      <div style={{ width:18, height:18, border:`2px solid ${accentAlpha(accent,0.2)}`, borderTopColor:accent, borderRadius:"50%", animation:"spin 0.7s linear infinite" }}></div>
      <span style={{ fontSize:13 }}>Loading details…</span>
    </div>
  );
  if (!items.length) return (
    <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12, color:"#bbb" }}>
      <div style={{ fontSize:40 }}>🔍</div>
      <div style={{ fontSize:14, fontWeight:500 }}>Select an item to view details</div>
      <div style={{ fontSize:12 }}>Double-click for quick view · Ctrl/Shift-click to multi-select</div>
    </div>
  );
  if (items.length === 1) {
    const it = items[0];
    return (
      <div style={{ padding:"20px 24px", overflowY:"auto", height:"100%" }}>
        <div style={{ display:"flex", gap:16, alignItems:"flex-start", marginBottom:20 }}>
          <PlaceholderImg size={120} src={it.thumbnail} />
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:18, fontWeight:600, lineHeight:1.3, marginBottom:6, wordBreak:"break-word" }}>{it.title || "(no title)"}</div>
            <div style={{ fontSize:24, fontWeight:700, color:accent }}>{formatPrice(it.price)}</div>
          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr", gap:"10px 20px", marginBottom:16 }}>
          <div>
            <div style={{ fontSize:11, color:"#999", marginBottom:2, textTransform:"uppercase", letterSpacing:"0.04em" }}>ID</div>
            <div style={{ fontSize:14, fontWeight:500, color:"#333", fontFamily:"ui-monospace, monospace" }}>{it.id}</div>
          </div>
          {it.url && (
            <div>
              <div style={{ fontSize:11, color:"#999", marginBottom:2, textTransform:"uppercase", letterSpacing:"0.04em" }}>Link</div>
              <a href={it.url} target="_blank" rel="noreferrer noopener" style={{ fontSize:14, fontWeight:500, color:accent, wordBreak:"break-all" }}>{it.url}</a>
            </div>
          )}
        </div>
        <div style={{ borderTop:"1px solid #eee", paddingTop:14 }}>
          <div style={{ fontSize:11, color:"#999", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.04em" }}>Description</div>
          <div style={{ fontSize:14, color:"#444", lineHeight:1.6, whiteSpace:"pre-wrap" }}>
            {(it.description && it.description.trim()) || "(empty description)"}
          </div>
        </div>
      </div>
    );
  }
  // multi-select summary
  const total = items.reduce((s,i)=>s + (parseInt(String(i.price ?? 0).replace(/,/g,""),10) || 0), 0);
  const avg = Math.round(total / items.length);
  return (
    <div style={{ padding:"20px 24px", overflowY:"auto", height:"100%" }}>
      <div style={{ fontSize:15, fontWeight:600, marginBottom:16 }}>{items.length} items selected</div>
      <div style={{ marginBottom:16, padding:"12px 14px", background:accentAlpha(accent,0.06), borderRadius:10 }}>
        <div style={{ fontSize:12, color:"#999", marginBottom:4 }}>Total value</div>
        <div style={{ fontSize:26, fontWeight:700, color:accent }}>¥{total.toLocaleString()}</div>
        <div style={{ fontSize:12, color:"#999", marginTop:2 }}>avg ¥{avg.toLocaleString()}</div>
      </div>
      {items.map(it=>(
        <div key={it.id} style={{ display:"flex", gap:10, padding:"10px 0", borderBottom:"1px solid #f0ece8", alignItems:"center" }}>
          <PlaceholderImg size={36} src={it.thumbnail} />
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{it.title || "(no title)"}</div>
            {it.url && <a href={it.url} target="_blank" rel="noreferrer noopener" style={{ fontSize:11, color:"#888" }}>Open ↗</a>}
          </div>
          <div style={{ fontSize:14, fontWeight:600, color:accent }}>{formatPrice(it.price)}</div>
        </div>
      ))}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const accent  = ACCENT;
  const layout  = LAYOUT;
  const density = DENSITY;
  const showImg = SHOW_IMG;
  const splitRatio = SPLIT_RATIO;

  const [keyword, setKeyword] = useState("");
  const [topN, setTopN] = useState(10);
  const [results, setResults] = useState([]);
  const [selected, setSelected] = useState(new Set());
  const [focused, setFocused] = useState(null);
  const [status, setStatus] = useState("Ready");
  const [searching, setSearching] = useState(false);
  const [detailsVisible, setDetailsVisible] = useState(true);
  const [detailItems, setDetailItems] = useState([]);
  const [detailsLoading, setDetailsLoading] = useState(false);
  const detailReqRef = useRef(0);

  const search = useCallback(async () => {
    const kw = keyword.trim();
    if (!kw) { setStatus("Enter a keyword to search"); return; }
    setSearching(true);
    setSelected(new Set());
    setFocused(null);
    setDetailItems([]);
    setStatus(`Searching for "${kw}"…`);
    try {
      const resp = await fetch(`/api/search?keyword=${encodeURIComponent(kw)}&top_n=${topN}`);
      const body = await resp.json();
      if (!resp.ok) throw new Error(body.error || `HTTP ${resp.status}`);
      const items = body.items || [];
      setResults(items);
      setStatus(items.length ? `${items.length} results found for "${kw}"` : `No results for "${kw}"`);
    } catch (err) {
      setResults([]);
      setStatus(`✖ Search failed: ${err.message}`);
    } finally {
      setSearching(false);
    }
  }, [keyword, topN]);

  const handleKeyDown = (e) => { if (e.key === "Enter") search(); };

  const handleSelect = (e, id) => {
    setFocused(id);
    if (e.ctrlKey || e.metaKey) {
      setSelected(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; });
    } else if (e.shiftKey && results.length) {
      const ids = results.map(r=>r.id);
      const last = focused != null ? ids.indexOf(focused) : 0;
      const cur = ids.indexOf(id);
      const [a,b] = [Math.min(last,cur), Math.max(last,cur)];
      setSelected(new Set(ids.slice(a,b+1)));
    } else {
      setSelected(new Set([id]));
    }
  };

  // Fetch details whenever selection changes.
  useEffect(() => {
    if (selected.size === 0) { setDetailItems([]); setDetailsLoading(false); return; }
    const ids = results.filter(r => selected.has(r.id)).map(r => r.id);
    if (ids.length === 0) { setDetailItems([]); return; }
    const reqId = ++detailReqRef.current;
    setDetailsLoading(true);
    fetch(`/api/details?ids=${encodeURIComponent(ids.join(","))}`)
      .then(async r => {
        const body = await r.json();
        if (!r.ok) throw new Error(body.error || `HTTP ${r.status}`);
        return body.items || [];
      })
      .then(items => {
        if (detailReqRef.current !== reqId) return; // stale
        // backfill thumbnails from the search results when missing
        const byId = new Map(results.map(r => [r.id, r]));
        const merged = items.map(it => ({
          ...it,
          thumbnail: it.thumbnail || (byId.get(it.id) && byId.get(it.id).thumbnail) || "",
        }));
        setDetailItems(merged);
        setStatus(`✓ Loaded details for ${merged.length} item(s)`);
      })
      .catch(err => {
        if (detailReqRef.current !== reqId) return;
        setDetailItems([]);
        setStatus(`✖ Fetch failed: ${err.message}`);
      })
      .finally(() => {
        if (detailReqRef.current === reqId) setDetailsLoading(false);
      });
  }, [selected, results]);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#f7f5f3" }}>
      {/* Header */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e8e4e0", padding:"0 20px", display:"flex", alignItems:"center", gap:14, height:56, flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginRight:8 }}>
          <div style={{ width:28, height:28, background:accent, borderRadius:7, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15 }}>🛍</div>
          <span style={{ fontWeight:600, fontSize:15, color:"#1a1714" }}>Mercari Agent</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8, flex:1 }}>
          <label style={{ fontSize:13, color:"#888", fontWeight:500, whiteSpace:"nowrap" }}>Keyword</label>
          <input
            value={keyword}
            onChange={e=>setKeyword(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="e.g. Nintendo Switch, Sony WH-1000XM5…"
            style={{ flex:1, height:34, padding:"0 12px", border:"1.5px solid #e0dbd6", borderRadius:8, fontSize:14, outline:"none", fontFamily:"inherit", background:"#faf9f7", transition:"border-color 0.15s" }}
            onFocus={e=>e.target.style.borderColor=accent}
            onBlur={e=>e.target.style.borderColor="#e0dbd6"}
          />
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
          <label style={{ fontSize:13, color:"#888", fontWeight:500 }}>Top-N</label>
          <input
            type="number" min={1} max={50} value={topN}
            onChange={e=>setTopN(Math.max(1,Math.min(50,parseInt(e.target.value)||10)))}
            style={{ width:56, height:34, padding:"0 8px", border:"1.5px solid #e0dbd6", borderRadius:8, fontSize:14, outline:"none", fontFamily:"inherit", background:"#faf9f7", textAlign:"center" }}
          />
        </div>
        <button
          onClick={search}
          disabled={searching}
          style={{ height:34, padding:"0 20px", background:searching?"#ccc":accent, color:"#fff", border:"none", borderRadius:8, fontSize:14, fontWeight:600, cursor:searching?"default":"pointer", transition:"background 0.15s", flexShrink:0, fontFamily:"inherit" }}
        >
          {searching ? "Searching…" : "Search"}
        </button>
        <button
          onClick={()=>setDetailsVisible(v=>!v)}
          style={{ height:34, padding:"0 14px", background:detailsVisible?accentAlpha(accent,0.1):"transparent", color:detailsVisible?accent:"#888", border:`1.5px solid ${detailsVisible?accentAlpha(accent,0.3):"#e0dbd6"}`, borderRadius:8, fontSize:13, fontWeight:500, cursor:"pointer", flexShrink:0, fontFamily:"inherit", transition:"all 0.15s" }}
        >
          {detailsVisible ? "Hide Details" : "Show Details"}
        </button>
      </div>

      {/* Main content */}
      <div style={{ flex:1, display:"flex", minHeight:0 }}>
        {/* Results panel */}
        <div style={{ width: detailsVisible ? `${splitRatio}%` : "100%", display:"flex", flexDirection:"column", minHeight:0, transition:"width 0.25s" }}>
          <div style={{ padding:"8px 16px 6px", fontSize:12, color:"#aaa", borderBottom:"1px solid #f0ece8", background:"#faf9f7", flexShrink:0 }}>
            Results — <strong>double-click</strong> = quick details · <strong>Ctrl/Shift+click</strong> = multi-select
            {results.length > 0 && <span style={{ float:"right", color:accent, fontWeight:600 }}>{results.length} items</span>}
          </div>
          <div style={{ flex:1, overflowY:"auto", padding: layout==="grid" ? "12px" : "8px 0" }}>
            {results.length === 0 && !searching && (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", gap:12, color:"#ccc", paddingBottom:40 }}>
                <div style={{ fontSize:48 }}>🛍️</div>
                <div style={{ fontSize:15, fontWeight:500, color:"#bbb" }}>Search for items on Mercari</div>
                <div style={{ fontSize:13, color:"#ccc" }}>Try: Nintendo Switch, Sony, Supreme, Canon…</div>
              </div>
            )}
            {searching && (
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100%", gap:10, color:accent }}>
                <div style={{ width:20, height:20, border:`2px solid ${accentAlpha(accent,0.2)}`, borderTopColor:accent, borderRadius:"50%", animation:"spin 0.7s linear infinite" }}></div>
                <span style={{ fontSize:14 }}>Searching Mercari…</span>
              </div>
            )}
            {!searching && layout === "list" && results.map(item=>(
              <ResultRow key={item.id} item={item}
                selected={selected.has(item.id)} focused={focused===item.id}
                onSelect={e=>handleSelect(e,item.id)}
                onDoubleClick={()=>{ setFocused(item.id); setSelected(new Set([item.id])); setDetailsVisible(true); }}
                density={density} accent={accent} showImg={showImg} />
            ))}
            {!searching && layout === "grid" && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))", gap:10 }}>
                {results.map(item=>(
                  <ResultCard key={item.id} item={item}
                    selected={selected.has(item.id)} focused={focused===item.id}
                    onSelect={e=>handleSelect(e,item.id)}
                    onDoubleClick={()=>{ setFocused(item.id); setSelected(new Set([item.id])); setDetailsVisible(true); }}
                    accent={accent} />
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Divider */}
        {detailsVisible && <div style={{ width:1, background:"#e8e4e0", flexShrink:0 }} />}

        {/* Details panel */}
        {detailsVisible && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", minHeight:0, background:"#fff" }}>
            <div style={{ padding:"8px 16px 6px", fontSize:12, color:"#aaa", borderBottom:"1px solid #f0ece8", background:"#faf9f7", flexShrink:0 }}>
              Details
              {detailItems.length > 1 && <span style={{ marginLeft:8, color:accent, fontWeight:600 }}>{detailItems.length} selected</span>}
            </div>
            <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column" }}>
              <DetailsPanel items={detailItems} loading={detailsLoading} accent={accent} />
            </div>
          </div>
        )}
      </div>

      {/* Status bar */}
      <div style={{ height:32, background:"#fff", borderTop:"1px solid #e8e4e0", display:"flex", alignItems:"center", padding:"0 16px", gap:16, flexShrink:0 }}>
        <div style={{ width:7, height:7, borderRadius:"50%", background:searching?"#f59e0b":results.length?"#22c55e":"#d0ccc8", transition:"background 0.3s" }}></div>
        <span style={{ fontSize:12, color:"#888" }}>{status}</span>
        {selected.size > 0 && <span style={{ fontSize:12, color:accent, fontWeight:500 }}>{selected.size} selected</span>}
        <div style={{ flex:1 }} />
        <span style={{ fontSize:11, color:"#ccc" }}>Mercari Agent · Web</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
{% endraw %}
</body>
</html>
